# golangci-lint v2 config for glyph. Conservative, fast linters that catch real
# bugs and keep style consistent without fighting the developer.
version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - revive
    - gosec
    - errorlint
    - exhaustive
    - modernize
  settings:
    errorlint:
      # Keep the errors.Is / errors.As enforcement, but not the blanket `%w`
      # rewrite of fmt.Errorf: house policy classifies errors eagerly at the
      # source into *core.Error, and wraps with %w ONLY when a sentinel must
      # survive for errors.Is branching — a mandatory %w would preserve chains
      # nothing branches on.
      errorf: false
    exhaustive:
      # A switch with a default arm has decided its fallback; don't demand every
      # enum member be spelled out on top of it.
      default-signifies-exhaustive: true
    gosec:
      # Scope gosec to the exec/file-injection rules that matter for a tool that
      # will shell out to git/gh (the gitsource/github packages arrive in Phase 5);
      # the rest is noise for a single-binary CLI. Those exec sites will carry
      # sparse, justified `#nosec G204` directives.
      includes:
        - G204 # subprocess launched with a non-constant argument
        - G304 # file read from a non-constant path
    errcheck:
      # Writes to stdout/stderr via fmt.Fprint* in a CLI are best-effort (a
      # broken pipe is not actionable); don't require checking them.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        # cobra RunE handlers have a fixed (cmd, args) signature; an unused one
        # is unavoidable, not a smell.
        - name: unused-parameter
          disabled: true
  exclusions:
    rules:
      # tests may ignore errors freely and shell out to git in helpers (the exec
      # surface gosec flags is test-only, not a security boundary).
      - path: _test\.go
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
