version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: glyph
    main: ./cmd/glyph
    binary: glyph
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X github.com/akira-toriyama/glyph/internal/version.Version={{.Version}}
      - -X github.com/akira-toriyama/glyph/internal/version.Commit={{.Commit}}
      - -X github.com/akira-toriyama/glyph/internal/version.Date={{.Date}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# Release notes are glyph's own: the goreleaser.yml workflow runs `glyph notes`
# from the tagged commit and passes the file via --release-notes (t-8hqn).
#
# This pipe must stay ENABLED. GoReleaser loads --release-notes INSIDE the
# changelog pipe (changelog.Run reads ctx.ReleaseNotesFile, then returns early
# before generating anything), while `disable: true` short-circuits that pipe in
# changelog.Skip. So disabling it silently drops the notes file and ships an
# EMPTY body — which is exactly what v0.8.2 shipped (t-bb72).
#
# Instead the built-in generator is neutered with an exclude-everything filter,
# which keeps the property the disable was reaching for: with the flag, the file
# wins (the early return means these filters never run); without it, the body is
# empty rather than falling back to the raw commit subjects that carry the
# unescaped-@mention surface this dogfooding removed. Loud, not wrong.
changelog:
  filters:
    exclude:
      - ".*"

# Homebrew cask pushed to the family tap on release. GoReleaser v2 ships prebuilt
# binaries as CASKS (the old `brews:` formula path is deprecated); the live
# Casks/glyph.rb in akira-toriyama/homebrew-tap is regenerated each release.
# Install: brew install akira-toriyama/tap/glyph.
homebrew_casks:
  - repository:
      owner: akira-toriyama
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/akira-toriyama/glyph
    description: "gitmoji-driven commit-lint, semver, and release notes for squash-merge repos"
    # The binary is unsigned; strip the quarantine xattr on macOS so Gatekeeper
    # allows launch (same pattern as the family's other casks).
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/glyph"]
          end

release:
  # Rolling-draft: pushes refresh a draft; publishing (or the tag) cuts it.
  draft: true
