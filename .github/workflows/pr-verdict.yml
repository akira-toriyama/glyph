name: glyph-pr-verdict

# Reusable workflow — the merge PREVIEW of the release verdict, posted as one
# sticky PR comment. Where release.yml reacts to a merge, this file answers
# the question a reviewer actually has BEFORE merging: what does this PR do
# to the version?
#
# `glyph preview --pr` does all of it: the verdict comes from the PR's
# INDIVIDUAL commits (pure API — squash-safe by the same mechanism as the
# release walk), never from the PR title, which a multi-commit PR's squash
# subject would have replaced; it folds in what is already merged but
# unreleased so the comment can distinguish "this PR escalates the next
# release to vX.Y.Z" from "it stays vX.Y.Z — a same-or-higher bump is already
# pending"; it skips that second walk on a repo with no v* tag (the walk is
# the only unbounded input here, and skipping it is what makes fleet-wide
# distribution safe); and it renders the body, marker included.
#
# This workflow is therefore two steps: run it, post it. That is deliberate —
# the fold is a VERSION decision internal/bump owns, and the ~60 lines of jq
# that used to make it here were a second opinion about which level wins,
# living where nobody could unit-test it or run it on a laptop. The same is
# true of the prose: "the next release", never "the rolling draft", because
# only a repo wired to release.yml keeps one and naming it elsewhere would be
# false, not merely noisy — a claim that load-bearing belongs in a package
# with tests (internal/preview), not in a heredoc. `glyph preview --pr N`
# prints these exact bytes locally.
#
# The comment is advisory, refreshed on every push, and this workflow is NOT
# meant to be a required check — the lint gate (lint.yml) owns convention
# enforcement. A PR carrying a commit the lint would reject fails this job
# too (the walk hard-errors on an unclassifiable commit, by design); the
# commit-lint check is the authoritative signal for that, so this job just
# goes red without duplicating the per-commit annotations.
#
# This is glyph's OFFICIAL PR-preview integration: the workflow and the
# binary it runs ship from the same repo and the same release, so a caller
# pins ONE concrete tag and can never mix workflow and binary revisions
# (GoReleaser owns the vX.Y.Z tag space — never pin a moving ref).
#
# THE CALLER MUST NOT BE NAMED pr-verdict.yml. This file — the reusable
# DEFINITION — occupies that name in glyph's own .github/workflows, and glyph
# is inside the fleet the caller is distributed to, so a caller synced to this
# path overwrites this file with its own 25-line stub. That is not
# hypothetical: it happened on 2026-07-17, and only the pinned tags (which
# callers resolve from, never main) kept the fleet running. The fleet caller
# is therefore version-preview.yml, mirroring the split that has always kept
# lint.yml (this repo's reusable) clear of commit-lint.yml (the distributed
# caller). Same rule for any future reusable: the DEFINITION and the CALLER
# never share a filename.
#
# Caller skeleton (.github/workflows/version-preview.yml in a code repo):
#   name: version-preview
#   on:
#     pull_request:
#       # synchronize is the point — the commits ARE the input, so every push
#       # recomputes the verdict (title edits are irrelevant, unlike a
#       # title-driven preview).
#       types: [opened, synchronize, reopened]
#   concurrency:
#     group: version-preview-${{ github.event.pull_request.number }}
#     cancel-in-progress: true
#   permissions:
#     contents: read
#     pull-requests: write
#   jobs:
#     verdict:
#       uses: akira-toriyama/glyph/.github/workflows/pr-verdict.yml@v0.10.0  # pin a release tag
#
# Gating on the verdict (the caller's policy, not this workflow's — see the
# outputs block below).
#
# TWO lines are load-bearing here, and the `if:` is the one that is easy to omit:
#
#   * `if: ${{ !cancelled() }}` — WITHOUT it the gate FAILS OPEN on exactly the
#     PRs it exists to catch. A fork PR skips the verdict job, and Actions skips
#     any job whose `needs:` was skipped, so a bare `needs: verdict` means the
#     empty check below never executes at all: the gate reports skipped, branch
#     protection sees no failure, and the uninspected PR merges. The same happens
#     whenever the verdict job fails (an unclassifiable commit makes it red by
#     design). `!cancelled()` runs the gate in both cases while still honouring a
#     cancelled workflow run.
#   * the empty check — a skipped verdict yields "" for every output, which means
#     NOT COMPUTED. Reading it as `none` is the same fail-open by another route.
#
#   jobs:
#     verdict:
#       uses: akira-toriyama/glyph/.github/workflows/pr-verdict.yml@v0.10.0
#     api-guard:
#       needs: verdict
#       if: ${{ !cancelled() }}          # ← without this the gate is skipped, not enforced
#       runs-on: ubuntu-latest
#       steps:
#         - run: |
#             if [ -z "${{ needs.verdict.outputs.level }}" ]; then
#               echo "::error::verdict unavailable (fork PR, or the verdict job failed) — refusing to pass the gate"
#               exit 1
#             fi
#             # ...then compare ${{ needs.verdict.outputs.breaking }} against
#             # whatever the repo knows about its own API surface.

on:
  workflow_call:
    inputs:
      glyph-version:
        description: >-
          Override the glyph release whose binary computes the verdict (vX.Y.Z).
          Leave empty (the default) and the version is derived from the tag the
          caller pinned this reusable to (job.workflow_ref), so @vX.Y.Z runs
          binary vX.Y.Z automatically. Set it only when pinning a non-tag ref (a
          branch or SHA), which has no release binary to derive.
        type: string
        default: ""
    outputs:
      # The verdict, machine-readable, so a caller can GATE on what this job
      # already computes. Without these the level was rendered into a comment
      # and discarded, and a caller wanting to act on it had three bad choices:
      # install glyph itself, re-implement the convention in grep, or parse the
      # comment prose. All three fork the rules; this forks nothing.
      #
      # SKIPPED JOB => EVERY OUTPUT IS THE EMPTY STRING. The fork guard below
      # skips this job on a fork PR, and GitHub gives a skipped job's outputs as
      # "". Empty therefore means NOT COMPUTED, never "no change" — a caller
      # gating on these MUST fail safe on empty rather than read it as `none`.
      #
      # This job stays ADVISORY: it is not a required check, and adding outputs
      # does not change that. Whether a verdict blocks a merge is the caller's
      # policy, expressed in the caller's own `if:` — the reusable computes, the
      # caller decides.
      level:
        description: >-
          The fold of this PR's verdict and what is already merged but
          unreleased: none | patch | minor | major. Empty when the job was
          skipped (fork PR).
        value: ${{ jobs.verdict.outputs.level }}
      next:
        description: >-
          The version the next release becomes (vX.Y.Z). Empty on a none
          verdict, and empty when the job was skipped.
        value: ${{ jobs.verdict.outputs.next }}
      current:
        description: >-
          The version being stepped from — the highest parseable v* tag, or
          v0.0.0 on an untagged repo. Empty when the job was skipped.
        value: ${{ jobs.verdict.outputs.current }}
      breaking:
        description: >-
          "true" when level is major, else "false" — the readable alias for a
          caller's `if:`. Empty when the job was skipped, which is NOT "false".
        value: ${{ jobs.verdict.outputs.breaking }}

permissions:
  contents: read

jobs:
  verdict:
    # Fork guard: a fork PR's GITHUB_TOKEN is read-only no matter what
    # `permissions:` asks for, so the comment POST would 403 — skip instead
    # of failing. Fork contributors still get the lint gate; the preview is
    # a same-repo convenience.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Two API-backed walks and one comment write; bound it so a hung step
    # can't idle a runner for hours.
    timeout-minutes: 10
    outputs:
      level: ${{ steps.verdict.outputs.level }}
      next: ${{ steps.verdict.outputs.next }}
      current: ${{ steps.verdict.outputs.current }}
      breaking: ${{ steps.verdict.outputs.breaking }}
    permissions:
      contents: read
      # The sticky comment (create + update), granted to this job only.
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The BASE branch, not the PR ref: `--since-tag` walks main's
          # squash commits out of LOCAL git (the PR side is read purely over
          # the API by `--pr`), and both walks resolve their step base from
          # the highest local v* tag — so the full base history and its tags
          # must be here.
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          # This job never pushes; don't leave the checkout token in
          # .git/config (zizmor artipacked).
          persist-credentials: false

      # Resolve the binary version from the tag the caller pinned this reusable
      # to (job.workflow_ref = …@refs/tags/vX.Y.Z), so the tag IS the version —
      # no hand-bumped default to drift. The override input covers a branch/SHA
      # pin, which has no release binary to derive from.
      - name: Resolve the pinned glyph version
        id: glyph
        env:
          WORKFLOW_REF: ${{ job.workflow_ref }}
          OVERRIDE: ${{ inputs.glyph-version }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE:-}" ]; then
            echo "version=$OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ref="${WORKFLOW_REF##*@}"
          case "$ref" in
            refs/tags/*) echo "version=${ref#refs/tags/}" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::glyph-pr-verdict is pinned to a non-tag ref ($ref); pass glyph-version to pick a release binary."; exit 1 ;;
          esac

      # Check out glyph's OWN source at the pinned commit so the install action
      # is available locally — a relative `uses:` in a reusable workflow resolves
      # against the CALLER's workspace, not glyph's, so the action must be
      # checked out here. AFTER the caller checkout above, whose workspace-root
      # clean would otherwise wipe this untracked subdirectory.
      - name: Check out glyph's install action at the pinned commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .glyph-action
          persist-credentials: false

      - name: Install glyph (pinned release binary, checksum + provenance verified)
        uses: ./.glyph-action/.github/actions/install
        with:
          version: ${{ steps.glyph.outputs.version }}
          token: ${{ github.token }}

      # ONE call composes the whole comment: glyph folds its own two verdicts
      # (this PR's individual commits, and what is already merged but
      # unreleased), skips the pending walk on a repo with no v* tag, and
      # renders the body — marker included. None of that is shell's business:
      # the fold is a version decision internal/bump owns, and the prose makes
      # claims (it must never name a rolling draft a repo does not keep) that
      # belong somewhere unit-testable rather than in a jq heredoc nobody can
      # run locally. `glyph preview --pr N` prints the same bytes on a laptop.
      #
      # A none verdict is a normal answer here and exits 0 — "this PR moves
      # nothing" is exactly what the reviewer asked, so there is no soft
      # no-release code to fold away.
      - name: Compose the verdict comment
        id: verdict
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # PR-context guard: outside a pull_request event there is no PR to
          # preview — fail loudly instead of previewing nothing (mirrors
          # lint.yml's guard).
          if [ -z "${PR_NUMBER:-}" ] || [ "$PR_NUMBER" = "0" ]; then
            echo "::error::glyph-pr-verdict requires a pull_request context (empty PR number)."
            exit 1
          fi
          status=0
          # --json carries the rendered body AND the machine verdict in ONE
          # payload, so exposing outputs costs no extra API walk: the comment
          # and the gate values are the same computation, not two opinions.
          glyph preview --pr "$PR_NUMBER" --notes --json \
            > "$RUNNER_TEMP/verdict.json" 2> "$RUNNER_TEMP/preview.err" || status=$?
          cat "$RUNNER_TEMP/preview.err" >&2
          if [ "$status" -ne 0 ]; then
            # Best-effort headline from the structured envelope; the preserved
            # glyph exit code is the verdict either way (a commit the lint
            # would reject fails here too — commit-lint owns that signal).
            jq -r '"::error::glyph preview: \(.error.message)"' \
              "$RUNNER_TEMP/preview.err" 2>/dev/null || true
            exit "$status"
          fi

          # Body to a FILE, never through the shell: it carries author-supplied
          # commit subjects.
          jq -r '.body' "$RUNNER_TEMP/verdict.json" > "$RUNNER_TEMP/body.md"

          # The verdict fields are a closed vocabulary glyph produces (a level
          # word and vX.Y.Z), so none of them can smuggle a newline into
          # $GITHUB_OUTPUT and split it into an attacker-chosen key.
          level="$(jq -r '.level' "$RUNNER_TEMP/verdict.json")"
          next="$(jq -r '.next // ""' "$RUNNER_TEMP/verdict.json")"
          current="$(jq -r '.current // ""' "$RUNNER_TEMP/verdict.json")"
          # An `if`, not `[ x = y ] && flag=true`: under `set -e` that idiom
          # exits the step whenever the test is false, so every non-major PR
          # would fail the job.
          if [ "$level" = "major" ]; then
            breaking=true
          else
            breaking=false
          fi
          {
            echo "level=$level"
            echo "next=$next"
            echo "current=$current"
            echo "breaking=$breaking"
          } >> "$GITHUB_OUTPUT"
          echo "verdict: level=$level current=$current next=$next breaking=$breaking"

      # ONE sticky comment per PR, found by the marker glyph puts at the top of
      # the body — never `gh pr comment --edit-last`, whose "the bot's last
      # comment is mine" assumption breaks the day any other workflow comments
      # as github-actions[bot]. The body reaches the API as a FILE: it carries
      # author-supplied commit subjects and must never be expanded by a shell.
      - name: Upsert the sticky comment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO_SLUG: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          cid="$(gh api "repos/$GH_REPO_SLUG/issues/$PR_NUMBER/comments" --paginate \
            --jq '[.[] | select(.body | startswith("<!-- glyph-pr-verdict -->"))][0].id // empty')"
          if [ -n "$cid" ]; then
            gh api --method PATCH "repos/$GH_REPO_SLUG/issues/comments/$cid" \
              -F "body=@$RUNNER_TEMP/body.md" --silent
          else
            gh api --method POST "repos/$GH_REPO_SLUG/issues/$PR_NUMBER/comments" \
              -F "body=@$RUNNER_TEMP/body.md" --silent
          fi
