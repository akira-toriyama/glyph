name: glyph-pr-verdict

# Reusable workflow — the merge PREVIEW of the release verdict, posted as one
# sticky PR comment. Where release.yml reacts to a merge, this file answers
# the question a reviewer actually has BEFORE merging: what does this PR do
# to the version?
#
# `glyph preview --pr` does all of it: the verdict comes from the PR's
# INDIVIDUAL commits (pure API — squash-safe by the same mechanism as the
# release walk), never from the PR title, which a multi-commit PR's squash
# subject would have replaced; it folds in what is already merged but
# unreleased so the comment can distinguish "this PR escalates the next
# release to vX.Y.Z" from "it stays vX.Y.Z — a same-or-higher bump is already
# pending"; it skips that second walk on a repo with no v* tag (the walk is
# the only unbounded input here, and skipping it is what makes fleet-wide
# distribution safe); and it renders the body, marker included.
#
# This workflow is therefore two steps: run it, post it. That is deliberate —
# the fold is a VERSION decision internal/bump owns, and the ~60 lines of jq
# that used to make it here were a second opinion about which level wins,
# living where nobody could unit-test it or run it on a laptop. The same is
# true of the prose: "the next release", never "the rolling draft", because
# only a repo wired to release.yml keeps one and naming it elsewhere would be
# false, not merely noisy — a claim that load-bearing belongs in a package
# with tests (internal/preview), not in a heredoc. `glyph preview --pr N`
# prints these exact bytes locally.
#
# The comment is advisory, refreshed on every push, and this workflow is NOT
# meant to be a required check — the lint gate (lint.yml) owns convention
# enforcement. A PR carrying a commit the lint would reject fails this job
# too (the walk hard-errors on an unclassifiable commit, by design); the
# commit-lint check is the authoritative signal for that, so this job just
# goes red without duplicating the per-commit annotations.
#
# This is glyph's OFFICIAL PR-preview integration: the workflow and the
# binary it runs ship from the same repo and the same release, so a caller
# pins ONE concrete tag and can never mix workflow and binary revisions
# (GoReleaser owns the vX.Y.Z tag space — never pin a moving ref).
#
# THE CALLER MUST NOT BE NAMED pr-verdict.yml. This file — the reusable
# DEFINITION — occupies that name in glyph's own .github/workflows, and glyph
# is inside the fleet the caller is distributed to, so a caller synced to this
# path overwrites this file with its own 25-line stub. That is not
# hypothetical: it happened on 2026-07-17, and only the pinned tags (which
# callers resolve from, never main) kept the fleet running. The fleet caller
# is therefore version-preview.yml, mirroring the split that has always kept
# lint.yml (this repo's reusable) clear of commit-lint.yml (the distributed
# caller). Same rule for any future reusable: the DEFINITION and the CALLER
# never share a filename.
#
# Caller skeleton (.github/workflows/version-preview.yml in a code repo):
#   name: version-preview
#   on:
#     pull_request:
#       # synchronize is the point — the commits ARE the input, so every push
#       # recomputes the verdict (title edits are irrelevant, unlike a
#       # title-driven preview).
#       types: [opened, synchronize, reopened]
#   concurrency:
#     group: version-preview-${{ github.event.pull_request.number }}
#     cancel-in-progress: true
#   permissions:
#     contents: read
#     pull-requests: write
#   jobs:
#     verdict:
#       uses: akira-toriyama/glyph/.github/workflows/pr-verdict.yml@v0.5.0  # pin a release tag

on:
  workflow_call:
    inputs:
      glyph-version:
        description: >-
          The glyph release whose binary computes the verdict (vX.Y.Z). The
          default is kept in LOCKSTEP with this file's own release tag
          (bumped right before tagging), so a caller pinned to @vX.Y.Z runs
          binary vX.Y.Z.
        type: string
        default: v0.5.0

permissions:
  contents: read

jobs:
  verdict:
    # Fork guard: a fork PR's GITHUB_TOKEN is read-only no matter what
    # `permissions:` asks for, so the comment POST would 403 — skip instead
    # of failing. Fork contributors still get the lint gate; the preview is
    # a same-repo convenience.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Two API-backed walks and one comment write; bound it so a hung step
    # can't idle a runner for hours.
    timeout-minutes: 10
    permissions:
      contents: read
      # The sticky comment (create + update), granted to this job only.
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The BASE branch, not the PR ref: `--since-tag` walks main's
          # squash commits out of LOCAL git (the PR side is read purely over
          # the API by `--pr`), and both walks resolve their step base from
          # the highest local v* tag — so the full base history and its tags
          # must be here.
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          # This job never pushes; don't leave the checkout token in
          # .git/config (zizmor artipacked).
          persist-credentials: false

      - name: Install glyph (pinned release binary, checksum + provenance verified)
        env:
          VER: ${{ inputs.glyph-version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ver="$VER"
          base="https://github.com/akira-toriyama/glyph/releases/download/$ver"
          file="glyph_${ver#v}_linux_amd64.tar.gz"
          curl -fsSL --retry 3 -o "/tmp/$file" "$base/$file"
          curl -fsSL --retry 3 -o /tmp/glyph-checksums.txt "$base/checksums.txt"
          ( cd /tmp && grep -F "  $file" glyph-checksums.txt | sha256sum -c - )
          # Provenance gate: the sha256 above only proves the tarball matches
          # THIS release's own checksums.txt (self-consistent — a forged
          # release could ship a matching pair). `gh attestation verify` also
          # proves the artifact was built by glyph's release workflow
          # (goreleaser.yml — the signer identity for v0.3.0+). Fail-closed,
          # with a bounded retry mirroring the curls' `--retry 3`: the
          # attestations API / Sigstore transparency log can blip, and an
          # advisory preview must not go red on a transient hiccup. Still
          # hard-fails after the last attempt.
          for i in 1 2 3; do
            if gh attestation verify "/tmp/$file" \
                 --repo akira-toriyama/glyph \
                 --signer-workflow akira-toriyama/glyph/.github/workflows/goreleaser.yml; then
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "attestation verification failed after 3 attempts" >&2
              exit 1
            fi
            echo "attestation verify failed (attempt $i); retrying" >&2
            sleep "$((i * 3))"
          done
          mkdir -p "$HOME/.local/bin"
          tar -xzf "/tmp/$file" -C "$HOME/.local/bin" glyph
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/glyph" version

      # ONE call composes the whole comment: glyph folds its own two verdicts
      # (this PR's individual commits, and what is already merged but
      # unreleased), skips the pending walk on a repo with no v* tag, and
      # renders the body — marker included. None of that is shell's business:
      # the fold is a version decision internal/bump owns, and the prose makes
      # claims (it must never name a rolling draft a repo does not keep) that
      # belong somewhere unit-testable rather than in a jq heredoc nobody can
      # run locally. `glyph preview --pr N` prints the same bytes on a laptop.
      #
      # A none verdict is a normal answer here and exits 0 — "this PR moves
      # nothing" is exactly what the reviewer asked, so there is no soft
      # no-release code to fold away.
      - name: Compose the verdict comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # PR-context guard: outside a pull_request event there is no PR to
          # preview — fail loudly instead of previewing nothing (mirrors
          # lint.yml's guard).
          if [ -z "${PR_NUMBER:-}" ] || [ "$PR_NUMBER" = "0" ]; then
            echo "::error::glyph-pr-verdict requires a pull_request context (empty PR number)."
            exit 1
          fi
          status=0
          glyph preview --pr "$PR_NUMBER" --notes \
            > "$RUNNER_TEMP/body.md" 2> "$RUNNER_TEMP/preview.err" || status=$?
          cat "$RUNNER_TEMP/preview.err" >&2
          if [ "$status" -ne 0 ]; then
            # Best-effort headline from the structured envelope; the preserved
            # glyph exit code is the verdict either way (a commit the lint
            # would reject fails here too — commit-lint owns that signal).
            jq -r '"::error::glyph preview: \(.error.message)"' \
              "$RUNNER_TEMP/preview.err" 2>/dev/null || true
            exit "$status"
          fi

      # ONE sticky comment per PR, found by the marker glyph puts at the top of
      # the body — never `gh pr comment --edit-last`, whose "the bot's last
      # comment is mine" assumption breaks the day any other workflow comments
      # as github-actions[bot]. The body reaches the API as a FILE: it carries
      # author-supplied commit subjects and must never be expanded by a shell.
      - name: Upsert the sticky comment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO_SLUG: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          cid="$(gh api "repos/$GH_REPO_SLUG/issues/$PR_NUMBER/comments" --paginate \
            --jq '[.[] | select(.body | startswith("<!-- glyph-pr-verdict -->"))][0].id // empty')"
          if [ -n "$cid" ]; then
            gh api --method PATCH "repos/$GH_REPO_SLUG/issues/comments/$cid" \
              -F "body=@$RUNNER_TEMP/body.md" --silent
          else
            gh api --method POST "repos/$GH_REPO_SLUG/issues/$PR_NUMBER/comments" \
              -F "body=@$RUNNER_TEMP/body.md" --silent
          fi
