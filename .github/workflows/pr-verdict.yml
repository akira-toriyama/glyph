name: glyph-pr-verdict

# Reusable workflow — the merge PREVIEW of the release verdict, posted as one
# sticky PR comment. Where release.yml reacts to a merge, this file answers
# the question a reviewer actually has BEFORE merging: what does this PR do
# to the version, and where does the rolling draft land if I merge it?
#
# The verdict is computed from the PR's INDIVIDUAL commits (`glyph bump
# --pr`, pure API — squash-safe by the same mechanism as the release walk),
# never from the PR title: a title-only preview would be wrong exactly when
# glyph's walk exists to be right, on a multi-commit PR whose squash subject
# erases the per-commit types. A second walk (`glyph bump --since-tag`, over
# the checked-out base branch) folds in what is already merged but not yet
# released, so the comment can distinguish "this PR escalates the draft to
# vX.Y.Z" from "the draft stays vX.Y.Z — a same-or-higher bump is already
# pending". Both walks step from the same highest v* tag, so the predicted
# draft tag is simply the `next` of whichever verdict folds higher — no
# version arithmetic ever happens in shell.
#
# The comment is advisory, refreshed on every push, and this workflow is NOT
# meant to be a required check — the lint gate (lint.yml) owns convention
# enforcement. A PR carrying a commit the lint would reject fails this job
# too (the walk hard-errors on an unclassifiable commit, by design); the
# commit-lint check is the authoritative signal for that, so this job just
# goes red without duplicating the per-commit annotations.
#
# This is glyph's OFFICIAL PR-preview integration: the workflow and the
# binary it runs ship from the same repo and the same release, so a caller
# pins ONE concrete tag and can never mix workflow and binary revisions
# (GoReleaser owns the vX.Y.Z tag space — never pin a moving ref).
#
# Caller skeleton (.github/workflows/pr-verdict.yml in a code repo):
#   name: pr-verdict
#   on:
#     pull_request:
#       # synchronize is the point — the commits ARE the input, so every push
#       # recomputes the verdict (title edits are irrelevant, unlike a
#       # title-driven preview).
#       types: [opened, synchronize, reopened]
#   concurrency:
#     group: pr-verdict-${{ github.event.pull_request.number }}
#     cancel-in-progress: true
#   permissions:
#     contents: read
#     pull-requests: write
#   jobs:
#     verdict:
#       uses: akira-toriyama/glyph/.github/workflows/pr-verdict.yml@v0.4.0  # pin a release tag

on:
  workflow_call:
    inputs:
      glyph-version:
        description: >-
          The glyph release whose binary computes the verdict (vX.Y.Z). The
          default is kept in LOCKSTEP with this file's own release tag
          (bumped right before tagging), so a caller pinned to @vX.Y.Z runs
          binary vX.Y.Z.
        type: string
        default: v0.4.0

permissions:
  contents: read

jobs:
  verdict:
    # Fork guard: a fork PR's GITHUB_TOKEN is read-only no matter what
    # `permissions:` asks for, so the comment POST would 403 — skip instead
    # of failing. Fork contributors still get the lint gate; the preview is
    # a same-repo convenience.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Two API-backed walks and one comment write; bound it so a hung step
    # can't idle a runner for hours.
    timeout-minutes: 10
    permissions:
      contents: read
      # The sticky comment (create + update), granted to this job only.
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The BASE branch, not the PR ref: `--since-tag` walks main's
          # squash commits out of LOCAL git (the PR side is read purely over
          # the API by `--pr`), and both walks resolve their step base from
          # the highest local v* tag — so the full base history and its tags
          # must be here.
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          # This job never pushes; don't leave the checkout token in
          # .git/config (zizmor artipacked).
          persist-credentials: false

      - name: Install glyph (pinned release binary, checksum + provenance verified)
        env:
          VER: ${{ inputs.glyph-version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ver="$VER"
          base="https://github.com/akira-toriyama/glyph/releases/download/$ver"
          file="glyph_${ver#v}_linux_amd64.tar.gz"
          curl -fsSL --retry 3 -o "/tmp/$file" "$base/$file"
          curl -fsSL --retry 3 -o /tmp/glyph-checksums.txt "$base/checksums.txt"
          ( cd /tmp && grep -F "  $file" glyph-checksums.txt | sha256sum -c - )
          # Provenance gate: the sha256 above only proves the tarball matches
          # THIS release's own checksums.txt (self-consistent — a forged
          # release could ship a matching pair). `gh attestation verify` also
          # proves the artifact was built by glyph's release workflow
          # (goreleaser.yml — the signer identity for v0.3.0+). Fail-closed,
          # with a bounded retry mirroring the curls' `--retry 3`: the
          # attestations API / Sigstore transparency log can blip, and an
          # advisory preview must not go red on a transient hiccup. Still
          # hard-fails after the last attempt.
          for i in 1 2 3; do
            if gh attestation verify "/tmp/$file" \
                 --repo akira-toriyama/glyph \
                 --signer-workflow akira-toriyama/glyph/.github/workflows/goreleaser.yml; then
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "attestation verification failed after 3 attempts" >&2
              exit 1
            fi
            echo "attestation verify failed (attempt $i); retrying" >&2
            sleep "$((i * 3))"
          done
          mkdir -p "$HOME/.local/bin"
          tar -xzf "/tmp/$file" -C "$HOME/.local/bin" glyph
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/glyph" version

      # The verdict PAIR: this PR alone (--pr, pure API) and what is already
      # merged on the base branch since the last tag (--since-tag, local walk
      # + API expansion). Exit 1 is glyph's uniform soft no-release — a valid
      # "none" verdict whose JSON still prints, so it flows into the compose
      # step like any other level. Anything else is a real failure (a commit
      # the lint would reject, git/API trouble) and fails the job with
      # glyph's own envelope on stderr.
      - name: Compute the verdict pair (this PR + pending on the base branch)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # PR-context guard: outside a pull_request event there is no PR to
          # preview — fail loudly instead of walking an empty input (mirrors
          # lint.yml's guard).
          if [ -z "${PR_NUMBER:-}" ] || [ "$PR_NUMBER" = "0" ]; then
            echo "::error::glyph-pr-verdict requires a pull_request context (empty PR number)."
            exit 1
          fi
          for source in pr pending; do
            if [ "$source" = "pr" ]; then
              args=(bump --pr "$PR_NUMBER" --json)
            else
              args=(bump --since-tag --json)
            fi
            status=0
            glyph "${args[@]}" \
              > "$RUNNER_TEMP/$source.json" 2> "$RUNNER_TEMP/$source.err" || status=$?
            cat "$RUNNER_TEMP/$source.err" >&2
            if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
              # Best-effort headline from the structured envelope; the
              # preserved glyph exit code is the verdict either way.
              jq -r '"::error::glyph bump: \(.error.message)"' \
                "$RUNNER_TEMP/$source.err" 2>/dev/null || true
              exit "$status"
            fi
          done

      # ONE sticky comment per PR, found by the marker its body starts with —
      # never `gh pr comment --edit-last`, whose "the bot's last comment is
      # mine" assumption breaks the day any other workflow comments as
      # github-actions[bot]. The body is composed entirely in jq from the two
      # verdict JSONs and posted from a file: commit subjects are user input
      # and are never expanded by the shell (zizmor template-injection).
      - name: Compose and upsert the sticky verdict comment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO_SLUG: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/compose.jq" <<'JQ'
          def rank: {"none": 0, "patch": 1, "minor": 2, "major": 3}[.];
          def icon: {"none": "⏸️", "patch": "🔧", "minor": "🔼", "major": "💥"}[.];
          # Markdown-table hygiene for commit subjects: escape the cell
          # separator, flatten any stray newline.
          def esc: gsub("\\|"; "\\|") | gsub("\n"; " ");

          $pr[0] as $p | $pending[0] as $q |
          ($p.level // "none") as $pl |
          ($q.level // "none") as $ql |
          $p.current as $cur |

          (if $pl == "none" and $ql == "none" then
            "⏸️ Merging this PR moves nothing — and nothing release-worthy is pending, so there is no rolling draft."
          elif $pl == "none" then
            "⏸️ This PR does not move the version — the rolling draft stays **\($q.next)**."
          elif ($pl | rank) > ($ql | rank) then
            if $ql == "none" then
              "\($pl | icon) Merging this PR raises **\($pl)** — the rolling draft becomes **\($cur) → \($p.next)**."
            else
              "\($pl | icon) Merging this PR raises **\($pl)** — the rolling draft escalates **\($q.next) → \($p.next)**."
            end
          else
            "\($pl | icon) Merging this PR adds **\($pl)**-level changes — the rolling draft stays **\($q.next)** (a **\($ql)** bump is already pending)."
          end) as $headline |

          ([$p.commits[] |
            "| \(.subject | esc) | \(.code) `\(.code)` | \(.level)\(if .breaking then " 💥" else "" end) |"
          ]) as $rows |

          (["<!-- glyph-pr-verdict -->", $headline, ""]
            + (if ($rows | length) > 0 then
                ["| commit | code | bump |", "|---|---|---|"] + $rows + [""]
              else [] end)
            + ["Computed from this PR's \($p.commits | length) individual commit(s) — squash-safe, a squash-merge cannot erase them — folded with what is already merged on the base branch since **\($cur)**. Pushing more commits updates this comment."])
          | join("\n")
          JQ
          jq -r -n \
            --slurpfile pr "$RUNNER_TEMP/pr.json" \
            --slurpfile pending "$RUNNER_TEMP/pending.json" \
            -f "$RUNNER_TEMP/compose.jq" > "$RUNNER_TEMP/body.md"
          cid="$(gh api "repos/$GH_REPO_SLUG/issues/$PR_NUMBER/comments" --paginate \
            --jq '[.[] | select(.body | startswith("<!-- glyph-pr-verdict -->"))][0].id // empty')"
          if [ -n "$cid" ]; then
            gh api --method PATCH "repos/$GH_REPO_SLUG/issues/comments/$cid" \
              -F "body=@$RUNNER_TEMP/body.md" --silent
          else
            gh api --method POST "repos/$GH_REPO_SLUG/issues/$PR_NUMBER/comments" \
              -F "body=@$RUNNER_TEMP/body.md" --silent
          fi
