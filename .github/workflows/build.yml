name: build

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Shared Go CI core (build / vet / race-test / module-hygiene / golangci-lint v2),
  # SHA-pinned once in the hub. go.mod carries a `toolchain` line, so gotoolchain is
  # left unset — setup-go honors and pins it (see the reusable's header footgun note).
  ci:
    uses: akira-toriyama/.github/.github/workflows/go-ci.yml@v1.2.0
    with:
      go-version-file: go.mod

  # Repo-specific checks that don't belong in the shared core. The smoke runs on
  # every leg so the shipped binary is exercised on every released platform shape:
  # darwin (brew cask) and linux arm64 (free for public repos) beside linux amd64
  # — the core test job (build + unit tests) covers none of these. The fuzz smoke
  # is Linux-only (house pattern): it discovers every Fuzz target and runs each
  # briefly, so new targets are covered with no edit here.
  extras:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Build/test-only, never pushes — drop the persisted checkout token
          # (zizmor artipacked). t-yaxa
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
          # setup-go keys the cache off go.mod by default; go.sum is the actual
          # dependency identity, so name it explicitly.
          cache-dependency-path: go.sum

      - name: smoke test
        run: |
          go build -o /tmp/glyph ./cmd/glyph
          /tmp/glyph version
          /tmp/glyph --version
          /tmp/glyph --help >/dev/null
          # rules self-prints its embedded table both ways; --json must carry the
          # pinned spec version, --md must lead with the docs heading.
          /tmp/glyph rules --json | grep -q '"version"'
          /tmp/glyph rules --md | head -1 | grep -q '^# gitmoji'
          # mutually-exclusive formats must be a usage error (exit 2), not a crash.
          if /tmp/glyph rules --json --md >/dev/null 2>&1; then
            echo "expected a usage error for rules --json --md" >&2
            exit 1
          fi
          # lint / bump exit-code contract on the shipped binary.
          /tmp/glyph lint --message ':bug: fix a crash'
          if /tmp/glyph lint --message 'no gitmoji' >/dev/null 2>&1; then
            echo "expected exit 3 for a malformed message" >&2
            exit 1
          fi
          # the checkout is a repo: an empty range is the soft no-release exit (1).
          if /tmp/glyph bump --range HEAD..HEAD >/dev/null 2>&1; then
            echo "expected exit 1 for an empty bump range" >&2
            exit 1
          fi

      # Bounded fuzz over every Fuzz target (never-panic / round-trip / fold
      # invariants). Auto-discovered per package so a new target needs no
      # workflow edit; scripts/check.sh mirrors this loop. The bound is an
      # execution COUNT, not a duration: a wall-clock -fuzztime makes the fuzz
      # engine race its own deadline at shutdown and FAIL green runs with a
      # spurious "context deadline exceeded" on loaded runners (Go's own
      # builders flake on this), whereas a count bound never creates that
      # deadline. Real hangs are still caught by the per-input 10s limit.
      - name: fuzz smoke (bounded)
        if: runner.os == 'Linux'
        run: |
          for pkg in $(go list ./...); do
            targets=$(go test -list '^Fuzz' "$pkg" | grep '^Fuzz' || true)
            for f in $targets; do
              go test "$pkg" -run '^$' -fuzz "^${f}\$" -fuzztime 200000x
            done
          done
