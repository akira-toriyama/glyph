name: goreleaser

# Tag-driven release: pushing a vX.Y.Z tag runs GoReleaser (binaries, checksums,
# Homebrew cask) and attaches build-provenance attestations. Deliberately NOT on
# every main push — that would run GoReleaser with no tag. Use workflow_dispatch
# for a manual run.
#
# Renamed from release.yml at v0.3.0: release.yml is now the reusable
# rolling-draft release the FAMILY consumes (DESIGN §6), while this file cuts
# glyph's OWN releases. This path is also the attestation SIGNER identity —
# what `gh attestation verify --signer-workflow` checks. Artifacts up to
# v0.2.0 were attested as release.yml, v0.3.0+ as goreleaser.yml; every
# reusable's glyph-version default is in lockstep with its own tag, so each
# pinned reusable verifies against the signer that actually built its binary
# and old pins stay valid. Renaming this file again would rotate the signer
# identity — don't, without bumping the verify paths in lint.yml / release.yml
# in the same release.
#
# Divergence from the other family Go CLIs (cifail/furrow): glyph does NOT run
# git-cliff here. glyph is the tool that replaces git-cliff, so depending on it for
# glyph's own release notes would be self-contradictory. Instead glyph dogfoods
# itself: the notes step below runs `glyph notes` FROM THE TAGGED COMMIT (go run —
# no published binary in the loop, so there is no bootstrap circularity) and hands
# the result to GoReleaser via --release-notes. This closes t-8hqn: GoReleaser's
# built-in changelog printed raw commit subjects, so a subject containing `@v2`
# or `@mentions` pinged strangers from glyph's own releases — the one surface
# t-hykw's escaping did not cover.
#
# --release-notes only lands if the changelog pipe stays ENABLED in
# .goreleaser.yaml: GoReleaser loads the file inside that pipe, so a
# `changelog.disable: true` drops it and ships an empty body (v0.8.2 did — see
# t-bb72). The neutered exclude-everything filter there is what keeps the
# built-in generator from ever writing raw subjects; don't swap it back for a
# disable. internal/workflows guards the pairing.
#
# Requires the HOMEBREW_TAP_TOKEN secret (write access to akira-toriyama/homebrew-tap)
# for the cask push. It is NOT fleet-distributed — set it on this repo before the
# first tag; without it the build + attestation still run and only the cask step fails.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write      # create the GitHub release
  id-token: write      # keyless signing for provenance attestation
  attestations: write  # write the attestation

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # GoReleaser only READs local git; every write (release, cask push)
          # goes through API tokens passed as env, never git — drop the
          # persisted checkout token (zizmor artipacked). t-yaxa
          persist-credentials: false

      # No job-level `env: GOTOOLCHAIN: local` — see build.yml. It would make
      # setup-go skip go.mod's `toolchain` line and ship release binaries built
      # with the bare floor. setup-go pins GOTOOLCHAIN=local itself.
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          # Release binaries must not be built from a shared, poisonable module
          # cache (zizmor cache-poisoning); PR-time caching stays in build.yml.
          # t-yaxa
          cache: false

      - name: release notes via glyph itself
        # The walk base is the tag BEFORE the one being cut: at tag-push time
        # the new tag is already the highest v*, and walking since itself would
        # produce empty notes. GITHUB_REF_NAME is the pushed tag (on a
        # workflow_dispatch re-run it is only correct when dispatched on the
        # tag ref — dispatching on a branch fails GoReleaser's own tag check
        # anyway). The file lands in runner.temp, not the checkout: an
        # untracked file would trip GoReleaser's dirty-state guard.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # An explicit `shell: bash` turns on `-e` and pipefail. `glyph notes`
        # writes straight to the file (never through a pipe) so no exit code can
        # be masked, and its status is inspected explicitly below rather than
        # left to -e, which cannot tell a soft no-release from a real failure.
        shell: bash
        run: |
          # The predecessor is the highest tag strictly BELOW the one being cut,
          # not merely the highest OTHER tag: cutting a v0.8.3 hotfix while
          # v0.9.0 exists must walk v0.8.2..v0.8.3, never backwards from v0.9.0.
          # awk over an ASCENDING version sort gives that, and (unlike
          # `grep -Fxv | head -1`) it always exits 0, so pipefail cannot kill the
          # step before the guard below can report a missing predecessor.
          prev="$(git tag --list 'v*' --sort=v:refname |
            awk -v cur="$GITHUB_REF_NAME" '$0 == cur { exit } { last = $0 } END { print last }')"
          if [ -z "$prev" ]; then
            echo "::error::no v* tag below $GITHUB_REF_NAME — cannot compute the walk base for release notes"
            exit 1
          fi
          echo "release notes walk: $prev..$GITHUB_REF_NAME"

          # `glyph notes` exits 1 as a SOFT no-release signal ("nothing
          # release-worthy in this range") — a distinct outcome from a hard
          # failure, and one `set -e` cannot tell apart. Left to -e, a tag cut
          # over an infra-only range (all :construction_worker: / :memo:) would
          # abort the whole job: no binaries, no cask, no attestation, behind a
          # tag that already exists. Honour the contract instead: 1 ships a
          # release that says so, anything else is a real failure.
          status=0
          go run ./cmd/glyph notes --since-tag="$prev" > "$RUNNER_TEMP/release-notes.md" || status=$?
          if [ "$status" -eq 1 ]; then
            echo "::warning::no release-worthy commits in $prev..$GITHUB_REF_NAME — publishing with a placeholder body"
            printf 'No release-worthy changes since %s.\n' "$prev" > "$RUNNER_TEMP/release-notes.md"
          elif [ "$status" -ne 0 ]; then
            echo "::error::glyph notes failed (exit $status)"
            exit "$status"
          fi
          cat "$RUNNER_TEMP/release-notes.md"

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # Pin the GoReleaser TOOL to the v2 line (never `latest`).
          version: "~> 2"
          args: release --clean --release-notes=${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to akira-toriyama/homebrew-tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/*.tar.gz, dist/checksums.txt'
