name: glyph-lint

# Reusable workflow — gitmoji commit lint over a PR's BASE..HEAD range, run by
# `glyph lint`. This is glyph's OFFICIAL commit-lint integration: the workflow
# and the binary it runs ship from the same repo and the same release, so a
# caller pins ONE concrete tag and can never mix workflow and binary revisions
# (GoReleaser owns the vX.Y.Z tag space — never pin a moving ref). Each family
# repo needs only the ~10-line caller stub distributed by fleet-sync:
#
#   # .github/workflows/commit-lint.yml in a code repo
#   name: commit-lint
#   on:
#     pull_request:
#   permissions:
#     contents: read
#   jobs:
#     lint:
#       uses: akira-toriyama/glyph/.github/workflows/lint.yml@v0.3.0  # pin a release tag
#
# The glyph binary is DOWNLOADED from a release — checksum-verified against the
# release's checksums.txt AND provenance-verified with `gh attestation verify`
# (fail-closed, bounded retry) — never `go install`ed. The `glyph-version`
# default in THIS file is kept in LOCKSTEP with the file's own release tag
# (bump it right before tagging), so the workflow revision a caller pins and
# the binary revision it runs cannot diverge.
#
# What the lint enforces (exit 3 on violation; see `glyph rules` for the table):
# a leading textual gitmoji per docs/DESIGN.md §2, with the retired Conventional
# token accepted on legacy history. Bots, merge commits, autosquash artifacts
# and raw `git revert` subjects are skipped, never failed. :construction: (WIP)
# is a violation here — a PR range is a merge candidate.

on:
  workflow_call:
    inputs:
      glyph-version:
        description: >-
          The glyph release whose binary is installed (vX.Y.Z). The default is
          kept in LOCKSTEP with this file's own release tag (bumped right
          before tagging), so a caller pinned to @vX.Y.Z runs binary vX.Y.Z.
        type: string
        default: v0.3.0

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    # Lint is fast; bound it so a hung step can't idle a runner for hours.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # glyph walks the PR range locally, so the full history must be here.
          fetch-depth: 0
          # This job never pushes; don't leave the checkout token in
          # .git/config (zizmor artipacked).
          persist-credentials: false

      - name: Install glyph (pinned release binary, checksum + provenance verified)
        env:
          VER: ${{ inputs.glyph-version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ver="$VER"
          base="https://github.com/akira-toriyama/glyph/releases/download/$ver"
          file="glyph_${ver#v}_linux_amd64.tar.gz"
          curl -fsSL --retry 3 -o "/tmp/$file" "$base/$file"
          curl -fsSL --retry 3 -o /tmp/glyph-checksums.txt "$base/checksums.txt"
          ( cd /tmp && grep -F "  $file" glyph-checksums.txt | sha256sum -c - )
          # Provenance gate: the sha256 above only proves the tarball matches
          # THIS release's own checksums.txt (self-consistent — a forged release
          # could ship a matching pair). `gh attestation verify` also proves the
          # artifact was built by glyph's release workflow (goreleaser.yml — the
          # signer identity for v0.3.0+; earlier releases were attested under
          # the pre-rename release.yml, and their lockstep lint.yml tags carry
          # that path). Fail-closed, with a bounded retry (mirrors the curls'
          # `--retry 3`): the attestations API / Sigstore transparency log can
          # blip, and a commit-lint gate must not go red on a transient hiccup.
          # Still hard-fails after the last attempt.
          for i in 1 2 3; do
            if gh attestation verify "/tmp/$file" \
                 --repo akira-toriyama/glyph \
                 --signer-workflow akira-toriyama/glyph/.github/workflows/goreleaser.yml; then
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "attestation verification failed after 3 attempts" >&2
              exit 1
            fi
            echo "attestation verify failed (attempt $i); retrying" >&2
            sleep "$((i * 3))"
          done
          mkdir -p "$HOME/.local/bin"
          tar -xzf "/tmp/$file" -C "$HOME/.local/bin" glyph
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/glyph" version

      - name: Lint the PR commit range
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # PR-context guard: in a non-PR context base/head are empty, so `..`
          # would collapse to an empty range and every commit "passes" silently.
          # Fail loudly instead — call this from a pull_request-triggered caller.
          if [ -z "${BASE:-}" ] || [ -z "${HEAD:-}" ]; then
            echo "::error::glyph-lint requires a pull_request context (empty base/head SHA)."
            exit 1
          fi
          status=0
          glyph lint --range "$BASE..$HEAD" 2>/tmp/glyph-lint.err || status=$?
          if [ "$status" -eq 0 ]; then
            echo "all commits OK"
            exit 0
          fi
          # The structured envelope goes to the log verbatim, and each finding
          # becomes a PR annotation. jq never fails the step on a non-JSON
          # envelope — the preserved glyph exit code is the verdict.
          cat /tmp/glyph-lint.err >&2
          if jq -e .error /tmp/glyph-lint.err >/dev/null 2>&1; then
            jq -r '(.error.details // [])[]
                     | "::error::\((.sha // "")[0:7]) \(.rule // ""): \(.detail // "")"' \
              /tmp/glyph-lint.err || true
            # The commit-format hint is for convention violations (exit 3) only —
            # an infra failure (git/API, exit 4) gets the bare message.
            if jq -e '.error.code == 3' /tmp/glyph-lint.err >/dev/null 2>&1; then
              jq -r '"::error::glyph lint: \(.error.message) — format: <:gitmoji:>[(scope)][!] <subject>; see `glyph rules` and https://github.com/akira-toriyama/.github/blob/main/CONTRIBUTING.md"' \
                /tmp/glyph-lint.err || true
            else
              jq -r '"::error::glyph lint: \(.error.message)"' /tmp/glyph-lint.err || true
            fi
          fi
          exit "$status"
