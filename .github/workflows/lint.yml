name: glyph-lint

# Reusable workflow — gitmoji commit lint over a PR's BASE..HEAD range, run by
# `glyph lint`. This is glyph's OFFICIAL commit-lint integration: the workflow
# and the binary it runs ship from the same repo and the same release, so a
# caller pins ONE concrete tag and can never mix workflow and binary revisions
# (GoReleaser owns the vX.Y.Z tag space — never pin a moving ref). Each family
# repo needs only the ~10-line caller stub distributed by fleet-sync:
#
#   # .github/workflows/commit-lint.yml in a code repo
#   name: commit-lint
#   on:
#     pull_request:
#   permissions:
#     contents: read
#   jobs:
#     lint:
#       uses: akira-toriyama/glyph/.github/workflows/lint.yml@vX.Y.Z  # pin a release tag
#
# @vX.Y.Z is a PLACEHOLDER, not a ref — substitute a concrete tag from
# https://github.com/akira-toriyama/glyph/releases. No live version is written
# here because none can be: a tag is cut on a commit that ALREADY EXISTS, so any
# version typed into this file names the PREVIOUS release the moment it ships.
# For a pin that is provably current, read .github/workflows/commit-lint.yml in
# THIS repo — glyph is inside the fleet it distributes to, so fleet-sync holds
# that caller at the canonical version. (This is also why a naive grep for glyph
# pins must skip comments: internal/workflows guards both halves.)
#
# The glyph binary is DOWNLOADED from a release — checksum-verified against the
# release's checksums.txt AND provenance-verified with `gh attestation verify`
# (fail-closed, bounded retry) — never `go install`ed. The install itself lives
# in ONE place, the composite action .github/actions/install; this job reaches
# it by checking out glyph's own source at the commit the caller pinned
# (job.workflow_sha) and using `./…` against that checkout. The binary VERSION
# is derived from job.workflow_ref — the tag the caller pinned this reusable to
# IS the binary it installs — so the workflow revision a caller pins and the
# binary revision it runs cannot diverge, with no hand-bumped default to fall
# out of lockstep (one did: this file sat at v0.4.0 through the v0.5.0 tag).
#
# What the lint enforces (exit 3 on violation; see `glyph rules` for the table):
# a leading textual gitmoji per docs/DESIGN.md §2, with the retired Conventional
# token accepted on legacy history. Bots, merge commits, autosquash artifacts
# and raw `git revert` subjects are skipped, never failed. :construction: (WIP)
# is a violation here — a PR range is a merge candidate.

on:
  workflow_call:
    inputs:
      glyph-version:
        description: >-
          Override the glyph release whose binary is installed (vX.Y.Z). Leave
          empty (the default) and the version is derived from the tag the caller
          pinned this reusable to (job.workflow_ref), so @vX.Y.Z runs binary
          vX.Y.Z automatically. Set it only when pinning a non-tag ref (a branch
          or SHA), which has no release binary to derive.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    # Lint is fast; bound it so a hung step can't idle a runner for hours.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # glyph walks the PR range locally, so the full history must be here.
          fetch-depth: 0
          # This job never pushes; don't leave the checkout token in
          # .git/config (zizmor artipacked).
          persist-credentials: false

      # Resolve the binary version from the tag the caller pinned this reusable
      # to. job.workflow_ref is <owner>/<repo>/<path>@refs/tags/vX.Y.Z for a tag
      # pin (the normal case), so the tag IS the version — no hand-bumped default
      # to drift. The override input covers a branch/SHA pin, which has no
      # release binary to derive from.
      - name: Resolve the pinned glyph version
        id: glyph
        env:
          WORKFLOW_REF: ${{ job.workflow_ref }}
          OVERRIDE: ${{ inputs.glyph-version }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE:-}" ]; then
            echo "version=$OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ref="${WORKFLOW_REF##*@}"
          case "$ref" in
            refs/tags/*) echo "version=${ref#refs/tags/}" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::glyph-lint is pinned to a non-tag ref ($ref); pass glyph-version to pick a release binary."; exit 1 ;;
          esac

      # Check out glyph's OWN source at the pinned commit so the install action
      # is available locally. Relative `uses:` in a reusable workflow resolves
      # against the CALLER's workspace, so the install action cannot be reached
      # by a bare `./…` — it must come from glyph's tree, checked out here. This
      # runs AFTER the caller checkout above: that one cleans the workspace root,
      # which would otherwise wipe this untracked subdirectory.
      - name: Check out glyph's install action at the pinned commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .glyph-action
          persist-credentials: false

      - name: Install glyph (pinned release binary, checksum + provenance verified)
        uses: ./.glyph-action/.github/actions/install
        with:
          version: ${{ steps.glyph.outputs.version }}
          token: ${{ github.token }}

      - name: Lint the PR commit range
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # PR-context guard: in a non-PR context base/head are empty, so `..`
          # would collapse to an empty range and every commit "passes" silently.
          # Fail loudly instead — call this from a pull_request-triggered caller.
          if [ -z "${BASE:-}" ] || [ -z "${HEAD:-}" ]; then
            echo "::error::glyph-lint requires a pull_request context (empty base/head SHA)."
            exit 1
          fi
          status=0
          glyph lint --range "$BASE..$HEAD" 2>/tmp/glyph-lint.err || status=$?
          if [ "$status" -eq 0 ]; then
            echo "all commits OK"
            exit 0
          fi
          # The structured envelope goes to the log verbatim, and each finding
          # becomes a PR annotation. jq never fails the step on a non-JSON
          # envelope — the preserved glyph exit code is the verdict.
          cat /tmp/glyph-lint.err >&2
          # That stream is annotations AND the envelope, and jq over the two
          # together is a parse error — a lint run that warned before it failed
          # would emit no annotations at all. The envelope is written last, so
          # everything from the first line opening with `{` is the whole
          # document; sieve it into a file once and let all four jq calls read
          # pure JSON. `[{]` rather than a bare `{` because an unmatched brace in
          # a BRE is POSIX-undefined, and sed rather than grep because a grep
          # that matches nothing exits 1 and would kill the step under
          # `set -o pipefail` whenever the error was Silent (t-sws7).
          sed -n '/^[{]/,$p' /tmp/glyph-lint.err > /tmp/glyph-lint.json
          if jq -e .error /tmp/glyph-lint.json >/dev/null 2>&1; then
            jq -r '(.error.details // [])[]
                     | "::error::\((.sha // "")[0:7]) \(.rule // ""): \(.detail // "")"' \
              /tmp/glyph-lint.json || true
            # The commit-format hint is for convention violations (exit 3) only —
            # an infra failure (git/API, exit 4) gets the bare message.
            if jq -e '.error.code == 3' /tmp/glyph-lint.json >/dev/null 2>&1; then
              jq -r '"::error::glyph lint: \(.error.message) — format: <:gitmoji:>[(scope)][!] <subject>; see `glyph rules` and https://github.com/akira-toriyama/.github/blob/main/CONTRIBUTING.md"' \
                /tmp/glyph-lint.json || true
            else
              jq -r '"::error::glyph lint: \(.error.message)"' /tmp/glyph-lint.json || true
            fi
          fi
          exit "$status"
