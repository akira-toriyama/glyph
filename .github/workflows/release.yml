name: glyph-release

# Reusable rolling-DRAFT release for the Swift family — glyph's OFFICIAL
# release integration and the successor of akira-toriyama/.github's
# release.yml@v1 (git-cliff). It ships either artifact shape the family
# builds: an `<App>.app` bundle (`app:` — package.sh → <App>.zip) or a bare
# binary (`binary:` — build.sh → bin/<binary> + a sha256). The workflow and
# the binary it runs ship from the same repo and the same release, so a
# caller pins ONE concrete tag (@vX.Y.Z, never a moving ref) and can never
# mix workflow and binary revisions. GoReleaser owns glyph's OWN tag-driven
# releases (goreleaser.yml) — this file is the reusable the family consumes.
#
# A push to the caller's main makes `glyph release` walk main's squash
# commits since the last v* tag, resolve each to its merged pull request over
# the API and classify the PR's individual (pre-squash) commits — squash-safe,
# stateless, self-healing (glyph docs/DESIGN.md §4) — then upsert the ONE
# glyph-managed rolling DRAFT release: tag = the next version, body = the
# grouped notes plus the caller's install block (`--footer-file`), target =
# the walked HEAD. No git tag is created — GitHub tags the target commit when
# a human publishes — and immutable releases stay deadlock-free: the next
# version must clear the published floor, and drafts are deleted by release
# id only, never by tag name. On a none verdict glyph deletes residual
# glyph-managed drafts (the draft state converges to the verdict) and exits 1,
# which this workflow folds into a success no-op — the soft no-release code
# is handled here once, so callers never script around it.
#
# The build stays the repo's uniform script — package.sh for an app bundle,
# build.sh for a bare binary (each runs `swift build -c release` itself) —
# with an optional post-build smoke, exactly as in the @v1 reusable; only
# the verdict engine changed. The upsert runs BEFORE the build: the verdict
# comes from one walk (tag and body can never split), and a build failure at
# worst leaves the draft's asset one merge stale — the next green run
# re-uploads with --clobber, and nothing is published without a human anyway.
#
# Caller skeleton (.github/workflows/release.yml in each consuming repo):
#   on:
#     push: { branches: [main] }
#     workflow_dispatch:
#       inputs:
#         dry_run: { description: "Preview only", type: boolean, default: false }
#   concurrency: { group: release, cancel-in-progress: false }
#   permissions: { contents: write }
#   jobs:
#     release:
#       uses: akira-toriyama/glyph/.github/workflows/release.yml@v0.8.0  # pin a release tag
#       with:
#         app: Facet              # → Facet.app / Facet.zip, binary `facet`
#         # …or, for a bare-binary tool (exactly one of app/binary):
#         # binary: glance        # → ./build.sh must produce bin/glance; attaches glance + glance.sha256
#         smoke: false            # true → run `<artifact> --validate`
#         dry-run: ${{ github.event.inputs.dry_run == 'true' }}
#         install-notes: |
#           ## Install
#           …app-specific markdown appended after the notes…

on:
  workflow_call:
    inputs:
      app:
        description: "App display name, e.g. 'Facet' → package.sh builds Facet.app, attaches Facet.zip, binary `facet`. Exactly one of `app` / `binary`."
        required: false
        type: string
        default: ""
      binary:
        description: "Bare-binary name, e.g. 'glance' → ./build.sh must produce bin/<binary>; attaches <binary> + <binary>.sha256. Exactly one of `app` / `binary`."
        required: false
        type: string
        default: ""
      install-notes:
        description: "Markdown appended verbatim after the generated notes, separated by one --- line (the per-repo `## Install` block)."
        required: true
        type: string
      smoke:
        description: "Run the built artifact with `--validate` after the build (`./<App>.app/Contents/MacOS/<app-lowercased>` in app mode, `./bin/<binary>` in binary mode)."
        required: false
        type: boolean
        default: false
      smoke-cmd:
        description: "Post-build smoke args, e.g. 'config --validate' — runs the built artifact with these args. Takes precedence over `smoke`; empty falls back to `smoke`."
        required: false
        type: string
        default: ""
      dry-run:
        description: "Preview only — the full verdict (draft action included) and the build, but no GitHub write (thread the caller's workflow_dispatch input)."
        required: false
        type: boolean
        default: false
      glyph-version:
        description: >-
          Override the glyph release whose binary computes the verdict (vX.Y.Z,
          v0.3.0 minimum — earlier binaries were attested under the pre-rename
          signer path). Leave empty (the default) and the version is derived
          from the tag the caller pinned this reusable to (job.workflow_ref), so
          @vX.Y.Z runs binary vX.Y.Z automatically. Set it only when pinning a
          non-tag ref (a branch or SHA), which has no release binary to derive.
        type: string
        default: ""

permissions:
  contents: write

jobs:
  release:
    # macos-26: family apps on the macOS-26 floor (sill v2.0.0+) ship
    # macOS-26 binaries the smoke step must EXECUTE — a macos-15 host can
    # compile them but cannot run them.
    runs-on: macos-26
    # Bounded so a hung step (build, signing, upload) can't burn the macOS
    # minutes budget. Generous — a cold build + package + upload fits easily.
    timeout-minutes: 30
    steps:
      # `required: true` cannot express "exactly one of app/binary", so the
      # arity is enforced here, before anything else runs.
      - name: Validate the artifact inputs
        env:
          APP: ${{ inputs.app }}
          BINARY: ${{ inputs.binary }}
        run: |
          set -euo pipefail
          if { [ -n "$APP" ] && [ -n "$BINARY" ]; } || { [ -z "$APP" ] && [ -z "$BINARY" ]; }; then
            echo "::error::exactly one of 'app' (app bundle via package.sh) or 'binary' (bare binary via build.sh) must be set."
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # glyph walks the tags and the range out of LOCAL git (its verdict
          # commands run inside a checkout by contract), so the full history
          # must be here.
          fetch-depth: 0
          # Every release write goes through glyph/gh + the GH_TOKEN env,
          # never git push — don't leave the checkout token in .git/config
          # (zizmor artipacked).
          persist-credentials: false

      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      # Same SPM cache as the swift-build action — package.sh runs `swift
      # build` underneath, so the warm artefacts help here too. The repo name
      # guards against stale PCH module-cache paths after a rename, and
      # Package.resolved is hashed so a dependency bump invalidates the cache
      # (hashFiles tolerates it missing for deps-free repos).
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ github.event.repository.name }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-${{ github.event.repository.name }}-

      # Resolve the binary version from the tag the caller pinned this reusable
      # to (job.workflow_ref = …@refs/tags/vX.Y.Z), so the tag IS the version —
      # no hand-bumped default to drift. The override input covers a branch/SHA
      # pin, which has no release binary to derive from.
      - name: Resolve the pinned glyph version
        id: glyph
        env:
          WORKFLOW_REF: ${{ job.workflow_ref }}
          OVERRIDE: ${{ inputs.glyph-version }}
        run: |
          set -euo pipefail
          if [ -n "${OVERRIDE:-}" ]; then
            echo "version=$OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ref="${WORKFLOW_REF##*@}"
          case "$ref" in
            refs/tags/*) echo "version=${ref#refs/tags/}" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::glyph-release is pinned to a non-tag ref ($ref); pass glyph-version to pick a release binary."; exit 1 ;;
          esac

      # Check out glyph's OWN source at the pinned commit so the install action
      # is available locally — a relative `uses:` in a reusable workflow resolves
      # against the CALLER's workspace, not glyph's, so the action must be
      # checked out here (the composite auto-detects this macOS runner and pulls
      # the darwin tarball). AFTER the caller checkout above, whose workspace-root
      # clean would otherwise wipe this untracked subdirectory.
      - name: Check out glyph's install action at the pinned commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .glyph-action
          persist-credentials: false

      - name: Install glyph (pinned release binary, checksum + provenance verified)
        uses: ./.glyph-action/.github/actions/install
        with:
          version: ${{ steps.glyph.outputs.version }}
          token: ${{ github.token }}

      # ONE walk composes the whole verdict (tag + body) and, unless this is
      # a dry run, upserts the rolling draft in the same call — recomputed
      # from git every run, so it is idempotent and self-healing. Exit 1 is
      # the uniform soft no-release: fold it into a success no-op here.
      - name: Compose the verdict and upsert the rolling DRAFT
        id: verdict
        env:
          GH_TOKEN: ${{ github.token }}
          INSTALL_NOTES: ${{ inputs.install-notes }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          # The caller's install block reaches glyph as a FILE (--footer-file)
          # — printf %s, no shell expansion of its backticks / $(…), and no
          # markdown ever concatenated in shell (ratified Q11).
          printf '%s' "$INSTALL_NOTES" > "$RUNNER_TEMP/install-notes.md"
          args=(release --json --footer-file "$RUNNER_TEMP/install-notes.md")
          if [ "$DRY_RUN" = "true" ]; then
            args=(release --dry-run --json --footer-file "$RUNNER_TEMP/install-notes.md")
          fi
          status=0
          glyph "${args[@]}" > "$RUNNER_TEMP/verdict.json" 2> "$RUNNER_TEMP/verdict.err" || status=$?
          cat "$RUNNER_TEMP/verdict.err" >&2
          if [ "$status" -eq 1 ]; then
            # Soft no-release: nothing version-worthy since the last tag.
            # glyph already converged the draft state (residual glyph-managed
            # drafts deleted — ratified Q3), so this run is complete.
            reason="$(jq -r '.reason // empty' "$RUNNER_TEMP/verdict.json" 2>/dev/null || true)"
            echo "::notice::${reason:-no release-worthy changes since the last tag} — nothing to do."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          tag="$(jq -r .tag "$RUNNER_TEMP/verdict.json")"
          action="$(jq -r .action "$RUNNER_TEMP/verdict.json")"
          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "verdict: $tag (draft $action)"

      # Build <App>.app via package.sh (ad-hoc signed for CI — the script
      # picks $CODESIGN_ID > .signing-id > "-"). Optional smoke for apps that
      # have one.
      - name: Build app + zip
        if: steps.verdict.outputs.release == 'true' && inputs.app != ''
        env:
          CODESIGN_ID: "-"
          APP: ${{ inputs.app }}
          SMOKE: ${{ inputs.smoke }}
          SMOKE_CMD: ${{ inputs.smoke-cmd }}
        run: |
          set -euo pipefail
          ./package.sh
          bin="$(echo "$APP" | tr '[:upper:]' '[:lower:]')"
          # `smoke-cmd` (e.g. `config --validate`) takes precedence; else the
          # boolean `smoke` runs `--validate`. Unquoted on purpose so
          # multi-word args split.
          if [ -n "$SMOKE_CMD" ]; then
            # shellcheck disable=SC2086 # intentional word-split (see above)
            "./${APP}.app/Contents/MacOS/${bin}" $SMOKE_CMD
          elif [ "$SMOKE" = "true" ]; then
            "./${APP}.app/Contents/MacOS/${bin}" --validate
          fi
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "${APP}.app" "artifacts/${APP}.zip"

      # Build the bare binary via build.sh (contract: it leaves the release
      # binary at bin/<binary>, ad-hoc signed in CI). The sha256 goes through
      # `openssl dgst -r` — same `<hash> *<file>` line `shasum -c` verifies —
      # because `shasum` itself is an install-only token the workflows test
      # forbids in a reusable's executable body (internal/workflows).
      - name: Build binary + sha256
        if: steps.verdict.outputs.release == 'true' && inputs.binary != ''
        env:
          BINARY: ${{ inputs.binary }}
          SMOKE: ${{ inputs.smoke }}
          SMOKE_CMD: ${{ inputs.smoke-cmd }}
        run: |
          set -euo pipefail
          ./build.sh
          # Same smoke contract as app mode: `smoke-cmd` takes precedence,
          # the boolean runs `--validate`. Unquoted so multi-word args split.
          if [ -n "$SMOKE_CMD" ]; then
            # shellcheck disable=SC2086 # intentional word-split (see above)
            "./bin/${BINARY}" $SMOKE_CMD
          elif [ "$SMOKE" = "true" ]; then
            "./bin/${BINARY}" --validate
          fi
          mkdir -p artifacts
          cp "bin/${BINARY}" artifacts/
          (cd artifacts && openssl dgst -r -sha256 "$BINARY" > "${BINARY}.sha256")

      # gh resolves an unpublished draft by its INTENDED tag for upload/view
      # (the @v1 reusable relied on the same), and --clobber replaces the
      # previous merge's asset on an updated draft. Whichever build step ran
      # left its artifact set in artifacts/ — upload it wholesale.
      - name: Attach the artifacts to the draft
        if: steps.verdict.outputs.release == 'true' && !inputs.dry-run
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.verdict.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" artifacts/* --clobber
          url="$(jq -r '.url // empty' "$RUNNER_TEMP/verdict.json")"
          echo "::notice::Draft release ${TAG} upserted (unpublished, no tag yet). Review & Publish manually: ${url}"
          {
            echo "## Draft release ${TAG} upserted (unpublished)"
            echo
            echo "Merging more to main grows this draft. Review and Publish"
            echo "manually (the tag is created at Publish time): ${url}"
          } >> "$GITHUB_STEP_SUMMARY"

      # dry_run (workflow_dispatch only): nothing was written; upload the
      # notes + artifact so the exact would-be release is previewable without
      # consuming a version.
      - name: Upload preview (dry run)
        if: steps.verdict.outputs.release == 'true' && inputs.dry-run
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-preview-${{ steps.verdict.outputs.tag }}
          path: |
            artifacts/
            ${{ runner.temp }}/verdict.json

      - name: Dry-run summary
        if: steps.verdict.outputs.release == 'true' && inputs.dry-run
        env:
          TAG: ${{ steps.verdict.outputs.tag }}
        run: |
          set -euo pipefail
          {
            echo "## Dry run: ${TAG} (nothing written)"
            echo
            echo "the draft action would be: $(jq -r .action "$RUNNER_TEMP/verdict.json")"
            echo
            echo '```'
            jq -r .body "$RUNNER_TEMP/verdict.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
