name: Install glyph
description: >-
  Download a pinned glyph release binary, verify it against the release's
  checksums.txt AND its build provenance (`gh attestation verify`, fail-closed
  with a bounded retry), and add it to $GITHUB_PATH. Detects the runner's OS and
  arch, so the one action serves the Linux lint/preview jobs and the macOS
  release job alike.

# This action is the SINGLE SOURCE of glyph's security-critical install logic.
# It used to live inline in three reusable workflows (lint.yml, pr-verdict.yml,
# release.yml), where the copies had already drifted — two hardcoded
# linux_amd64 + `sha256sum`, one darwin_arm64 + `shasum`. Keep it here and here
# only; a Go test (internal/workflows) fails if the download or the attestation
# gate reappears inline in a reusable.
#
# glyph's own reusables reach this action by checking out glyph's source at the
# commit the caller pinned (job.workflow_sha) and using `./…` against that
# checkout — NOT `uses: akira-toriyama/glyph/.github/actions/install@vX.Y.Z`.
# A relative `uses:` inside a reusable workflow resolves against the CALLER's
# workspace, never the reusable's repo, so a bare `./…` would look for this file
# in the consumer's tree and fail. A CONSUMER that wants glyph on a laptop-in-CI
# (e.g. sill's api-guard) references it the other way, by full path + tag:
#   - uses: akira-toriyama/glyph/.github/actions/install@vX.Y.Z
#     with: { version: vX.Y.Z, token: ${{ github.token }} }

inputs:
  version:
    description: >-
      The glyph release to install (vX.Y.Z). Required. glyph's own reusables
      derive it from job.workflow_ref (the tag the caller pinned), so the binary
      revision always matches the workflow revision with no hand-bumped default
      to drift; a consumer passes the tag it pinned this action to.
    required: true
  token:
    description: >-
      Token for `gh attestation verify` (the provenance gate hits the GitHub
      API). Pass the caller's `github.token`. Required and has no default: a
      composite action does not inherit the job's env, and the github context
      is not available in this manifest (so it cannot be defaulted here) — the
      expression must be written in the workflow step that USES this action.
      Do NOT write a template expression in this description: GitHub evaluates
      one even in a description string, and github is not a valid context here.
    required: true

runs:
  using: composite
  steps:
    - name: Install glyph (pinned release binary, checksum + provenance verified)
      shell: bash
      env:
        VER: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        ver="$VER"

        # GoReleaser ships glyph_<ver>_<os>_<arch>.tar.gz for {linux,darwin} x
        # {amd64,arm64}. Map the runner's OWN OS/arch (RUNNER_OS / RUNNER_ARCH
        # are set on every runner) instead of hardcoding one triple — the
        # linux_amd64 hardcode was exactly why this block could not be shared
        # across the Linux and macOS jobs before. macOS has no `sha256sum`, so
        # the checksum tool is chosen alongside the OS.
        case "$RUNNER_OS" in
          Linux) os=linux;  sha_check() { sha256sum -c -; } ;;
          macOS) os=darwin; sha_check() { shasum -a 256 -c -; } ;;
          *) echo "::error::glyph install: unsupported runner OS '$RUNNER_OS'"; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::glyph install: unsupported runner arch '$RUNNER_ARCH'"; exit 1 ;;
        esac

        base="https://github.com/akira-toriyama/glyph/releases/download/$ver"
        file="glyph_${ver#v}_${os}_${arch}.tar.gz"
        # --retry 5 spans ~31s of exponential backoff (1+2+4+8+16). The old
        # --retry 3 (~7s) was outlived by a real GitHub minor outage — a fleet
        # verdict job died on 504×4 downloading this binary (t-yj1b) — and this
        # window matches the 1s→4s→16s schedule glyph's own API calls retry on.
        # --retry-connrefused folds connection-refused into the transient set:
        # an outage resets connections as often as it answers 5xx.
        curl -fsSL --retry 5 --retry-connrefused -o "$RUNNER_TEMP/$file" "$base/$file"
        curl -fsSL --retry 5 --retry-connrefused -o "$RUNNER_TEMP/glyph-checksums.txt" "$base/checksums.txt"
        # An empty grep (checksum line missing) yields empty stdin, which the
        # `-c` check fails — so a missing entry fails the step, by design.
        ( cd "$RUNNER_TEMP" && grep -F "  $file" glyph-checksums.txt | sha_check )

        # Provenance gate: the sha256 above only proves the tarball matches THIS
        # release's own checksums.txt (self-consistent — a forged release could
        # ship a matching pair). `gh attestation verify` also proves the artifact
        # was built by glyph's release workflow (goreleaser.yml — the signer
        # identity for v0.3.0+; earlier releases were attested under the
        # pre-rename release.yml, and their lockstep reusable tags carry that
        # path). Fail-closed, with a bounded retry sized like the curls' window
        # (~30s): the attestations API / Sigstore transparency log rides the
        # same infrastructure that just proved able to stay down past a short
        # retry (t-yj1b), and a CI gate must not go red on a transient hiccup.
        # Still hard-fails after the last attempt.
        for i in 1 2 3 4 5; do
          if gh attestation verify "$RUNNER_TEMP/$file" \
               --repo akira-toriyama/glyph \
               --signer-workflow akira-toriyama/glyph/.github/workflows/goreleaser.yml; then
            break
          fi
          if [ "$i" -eq 5 ]; then
            echo "attestation verification failed after 5 attempts" >&2
            exit 1
          fi
          echo "attestation verify failed (attempt $i); retrying" >&2
          sleep "$((i * 3))"
        done

        mkdir -p "$HOME/.local/bin"
        tar -xzf "$RUNNER_TEMP/$file" -C "$HOME/.local/bin" glyph
        # Propagates to later JOB steps (not to this step — a composite action's
        # own step cannot see its GITHUB_PATH write), so the smoke below runs the
        # binary by absolute path while downstream steps call bare `glyph`.
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/glyph" version
